{% extends 'mahasiswa/base.html' %} 
{% load static %} 
{% block content %}
<a href="{% url 'tambah_mahasiswa' %}">
    Tambah Mahasiswa
</a>

<br><br>
<table border="1">
  <tr>
    <th>NIM</th>
    <th>Nama</th>
    <th>Program Studi</th>
    <th>Angkatan</th>
  </tr>
  {% for mhs in mahasiswa %}
  <tr>
    <td>{{ mhs.nim }}</td>
    <td>{{ mhs.nama }}</td>
    <td>{{ mhs.programstudi }}</td>
    <td>{{ mhs.angkatan }}</td>
    <td> 
      <a href="{% url 'edit_mahasiswa' mhs.id %}">
        Edit
      </a>
      <a href="{% url 'hapus_mahasiswa' mhs.id %}">
        Hapus
      </a>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="3">Belum ada data.</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
